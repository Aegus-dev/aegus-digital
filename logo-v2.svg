<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="orbGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="30%" style="stop-color:#00B8D4"/>
      <stop offset="60%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6B8A"/>
    </linearGradient>
    <linearGradient id="orbGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5C8"/>
      <stop offset="40%" style="stop-color:#4ECDC4"/>
      <stop offset="70%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#FF6B8A"/>
    </linearGradient>
    <linearGradient id="orbGrad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B8A"/>
      <stop offset="50%" style="stop-color:#FFA07A"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <radialGradient id="orbCenter" cx="45%" cy="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="innerClip">
      <circle cx="400" cy="400" r="260"/>
    </clipPath>
  </defs>
  
  <!-- Outer dark ring -->
  <circle cx="400" cy="400" r="395" fill="#0F1729"/>
  
  <!-- Thin accent border -->
  <circle cx="400" cy="400" r="395" fill="none" stroke="#1A2332" stroke-width="4"/>
  
  <!-- Ring band -->
  <circle cx="400" cy="400" r="340" fill="none" stroke="#162030" stroke-width="120"/>
  
  <!-- Inner border circles -->
  <circle cx="400" cy="400" r="285" fill="none" stroke="#2A3444" stroke-width="2"/>
  <circle cx="400" cy="400" r="395" fill="none" stroke="#2A3444" stroke-width="2"/>
  
  <!-- Top arc text: AEGUS DIGITAL -->
  <path id="topArc" d="M 120,400 A 280,280 0 0,1 680,400" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#FFFFFF" letter-spacing="14">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">AEGUS DIGITAL</textPath>
  </text>
  
  <!-- Bottom arc text: AI AGENCY -->
  <path id="bottomArc" d="M 140,400 A 260,260 0 0,0 660,400" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF" letter-spacing="12">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">AI AGENCY</textPath>
  </text>

  <!-- Small dots as separators on the ring -->
  <circle cx="110" cy="380" r="6" fill="#00D4AA"/>
  <circle cx="690" cy="380" r="6" fill="#00D4AA"/>
  <circle cx="110" cy="420" r="6" fill="#00D4AA"/>
  <circle cx="690" cy="420" r="6" fill="#00D4AA"/>
  
  <!-- Inner circle background -->
  <circle cx="400" cy="400" r="260" fill="#0A0F1C"/>
  
  <!-- Abstract fluid orb - layered ellipses -->
  <g clip-path="url(#innerClip)">
    <!-- Base swirl -->
    <ellipse cx="350" cy="350" rx="220" ry="180" transform="rotate(-20, 400, 400)" fill="url(#orbGrad1)" opacity="0.7"/>
    <ellipse cx="450" cy="420" rx="200" ry="160" transform="rotate(25, 400, 400)" fill="url(#orbGrad2)" opacity="0.6"/>
    <ellipse cx="380" cy="450" rx="180" ry="140" transform="rotate(-45, 400, 400)" fill="url(#orbGrad3)" opacity="0.5"/>
    
    <!-- Inner swirls for depth -->
    <ellipse cx="420" cy="370" rx="150" ry="100" transform="rotate(15, 400, 400)" fill="url(#orbGrad1)" opacity="0.5"/>
    <ellipse cx="370" cy="430" rx="120" ry="90" transform="rotate(-30, 400, 400)" fill="url(#orbGrad2)" opacity="0.4"/>
    <ellipse cx="430" cy="390" rx="80" ry="60" transform="rotate(40, 400, 400)" fill="url(#orbGrad3)" opacity="0.5"/>
    
    <!-- Light reflection -->
    <circle cx="400" cy="400" r="260" fill="url(#orbCenter)"/>
    
    <!-- Shield silhouette overlay -->
    <g transform="translate(400, 390)" opacity="0.25">
      <path d="M0,-80 L55,-55 L55,15 C55,50 28,75 0,90 C-28,75 -55,50 -55,15 L-55,-55 Z" 
            fill="#FFFFFF"/>
    </g>
  </g>
  
  <!-- Inner circle border -->
  <circle cx="400" cy="400" r="260" fill="none" stroke="#2A3444" stroke-width="3"/>
</svg>
