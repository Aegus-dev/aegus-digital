<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1729"/>
      <stop offset="100%" style="stop-color:#1A2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00F5C8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="50%" style="stop-color:#00F5C8"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="400" cy="400" r="395" fill="#0A0F1C"/>
  
  <!-- Accent ring -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="url(#ring)" stroke-width="8"/>
  
  <!-- Inner dark circle -->
  <circle cx="400" cy="400" r="365" fill="url(#bg)"/>
  
  <!-- Inner subtle ring -->
  <circle cx="400" cy="400" r="320" fill="none" stroke="#2A3444" stroke-width="2"/>

  <!-- Shield icon -->
  <g transform="translate(400, 250)">
    <path d="M0,-120 L80,-80 L80,20 C80,70 40,110 0,130 C-40,110 -80,70 -80,20 L-80,-80 Z" 
          fill="none" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round"/>
    <path d="M0,-90 L60,-58 L60,15 C60,55 30,85 0,100 C-30,85 -60,55 -60,15 L-60,-58 Z" 
          fill="url(#accent)" opacity="0.15"/>
    <!-- Checkmark inside shield -->
    <path d="M-25,10 L-8,28 L30,-15" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- AEGUS text -->
  <text x="400" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" 
        font-size="88" font-weight="800" letter-spacing="12" fill="url(#accent)">AEGUS</text>
  
  <!-- Subtitle -->
  <text x="400" y="535" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" 
        font-size="32" font-weight="400" letter-spacing="8" fill="#8B95A5">DIGITAL AGENCY</text>

  <!-- Bottom arc text area -->
  <text x="400" y="610" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" 
        font-size="22" font-weight="600" letter-spacing="4" fill="#00D4AA" opacity="0.6">AI  ·  AUTOMATION  ·  GPT</text>
</svg>
